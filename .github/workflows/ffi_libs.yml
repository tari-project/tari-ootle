---
name: FFI native libs

# Builds the ootle_sdk_ffi_c native libs (static .a + shared lib + header) for every consumer
# platform on a native runner, then attaches one zip per platform to the tag's draft release —
# next to the tari_ootle-* binary archives. Lets Go/C/C++/C# consumers link a prebuilt lib instead
# of needing the Rust toolchain. Build/strip/provenance logic lives in scripts/build_ffi_lib.sh.
#
# Target coverage: macOS (arm64 + x86_64), Linux glibc (x86_64 + arm64), Linux musl static
# (x86_64, for Alpine / fully-static Go consumers), and Windows x64 (GNU ABI for cgo). Windows-ARM
# is intentionally omitted (low consumer demand); request it if needed. The musl artifact ships a
# static .a only — link it into a static binary, not against a glibc host.
#
# Third-party actions are pinned to a full commit SHA (with a trailing version comment) because the
# write-scoped build/release jobs carry the release token; a pinned SHA is immutable supply-chain
# provenance. Bump the SHA + comment together when upgrading.

'on':
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]*"
    branches:
      - "build-ffi-*"
  workflow_dispatch:

env:
  CRATE: ootle_sdk_ffi_c

concurrency:
  group: '${{ github.workflow }} @ ${{ github.ref }}'
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/v') }}

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - { platform: macos-arm64,  target: aarch64-apple-darwin,      runner: macos-14 }
          - { platform: macos-x86_64, target: x86_64-apple-darwin,       runner: macos-15-intel }
          - { platform: linux-x86_64, target: x86_64-unknown-linux-gnu,  runner: ubuntu-22.04 }
          - { platform: linux-arm64,  target: aarch64-unknown-linux-gnu, runner: ubuntu-22.04-arm }
          # Static lib for Alpine / fully-static Go consumers. musl drops the cdylib (crt-static), so
          # only the .a ships; musl-tools (installed below) supplies the linker rustc needs.
          - { platform: linux-x86_64-musl, target: x86_64-unknown-linux-musl, runner: ubuntu-22.04 }
          # cgo links via mingw on Windows, so build the GNU staticlib (.a), not the MSVC .lib.
          - { platform: windows-x64,  target: x86_64-pc-windows-gnu,     runner: windows-2022 }
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout source code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          submodules: recursive

      # musl-tools provides the musl-gcc cross-linker rustc invokes for the musl target.
      - name: Install musl toolchain
        if: ${{ matrix.platform == 'linux-x86_64-musl' }}
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Declare version variables
        id: vars
        run: |
          echo "VSHA_SHORT=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          VER=$(sed -nE 's/^version[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/p' Cargo.toml | head -n1)
          echo "TARI_VERSION=${VER}" >> "$GITHUB_OUTPUT"

      # Windows: install the GNU host toolchain (bundles its own mingw linker) so the .a is the
      # GNU-ABI lib cgo links against — not the MSVC .lib. Setting it as the toolchain (rather than
      # a later `rustup default`) avoids the action's RUSTUP_TOOLCHAIN override winning.
      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537  # master (no version tag)
        with:
          toolchain: ${{ matrix.platform == 'windows-x64' && 'stable-x86_64-pc-windows-gnu' || 'stable' }}
          targets: ${{ matrix.target }}

      - name: Build + stage native libs
        run: |
          scripts/build_ffi_lib.sh \
            --platform "${{ matrix.platform }}" \
            --target   "${{ matrix.target }}" \
            --out      "dist/${{ matrix.platform }}"

      - name: Package archive + checksum
        id: pkg
        run: |
          base="${CRATE}-${{ steps.vars.outputs.TARI_VERSION }}-${{ steps.vars.outputs.VSHA_SHORT }}-${{ matrix.platform }}"
          ( cd "dist/${{ matrix.platform }}" && 7z a "../../${base}.zip" ./* )
          if command -v sha256sum >/dev/null 2>&1; then sha256sum "${base}.zip" > "${base}.zip.sha256";
          else shasum -a 256 "${base}.zip" > "${base}.zip.sha256"; fi
          cat "${base}.zip.sha256"
          echo "base=${base}" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: ${{ env.CRATE }}-${{ matrix.platform }}
          path: |
            ${{ steps.pkg.outputs.base }}.zip
            ${{ steps.pkg.outputs.base }}.zip.sha256

  release:
    name: Attach to draft release
    needs: build
    if: ${{ startsWith(github.ref, 'refs/tags/v') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all libs
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          pattern: ${{ env.CRATE }}-*
          path: dist
          merge-multiple: true

      - name: Verify checksums
        working-directory: dist
        run: |
          ls -alh
          for f in *.zip.sha256; do
            sed -i 's/\r$//' "$f"          # strip any CR a Windows runner may have added
            sha256sum --check "$f"
          done

      - name: Publish to draft release
        uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd  # v1.21.0
        with:
          artifacts: "dist/*.zip,dist/*.zip.sha256"
          token: ${{ secrets.GITHUB_TOKEN }}
          prerelease: true
          draft: true
          allowUpdates: true
          updateOnlyUnreleased: true
          replacesArtifacts: true
          omitBodyDuringUpdate: true
          omitNameDuringUpdate: true
