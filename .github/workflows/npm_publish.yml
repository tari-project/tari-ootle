---
# Publishing all NPM packages to the npm registry when a version tag is pushed.
# Packages whose local version already matches the registry are skipped.
# See https://github.com/marketplace/actions/npm-publish for more information
name: Publish Packages to npmjs

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]*"
  # Allows you to run this workflow manually from the Actions tab on GitHub.
  workflow_dispatch:

permissions: {}

jobs:
  # Publish the TypeScript bindings to the NPM registry
  publish-typescript-bindings:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: bindings
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
      - name: Use Node.js from .nvmrc
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          registry-url: "https://registry.npmjs.org"
          node-version-file: .nvmrc
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build-dist
      - name: Publish to NPM
        run: |
          #set -euo pipefail

          echo "== Local package.json =="
          node -e "const p=require('./package.json'); console.log({name:p.name, version:p.version})"

          LOCAL_VERSION=$(node -p "require('./package.json').version")
          PACKAGE_NAME=$(node -p "require('./package.json').name")

          echo "Local version: $LOCAL_VERSION"
          echo "Package name:  $PACKAGE_NAME"

          echo "== Registry check =="
          echo "Running: pnpm info $PACKAGE_NAME version"

          REMOTE_VERSION=$(pnpm info "$PACKAGE_NAME" version 2>/dev/null || echo "NOT_FOUND")
          echo "Remote version: $REMOTE_VERSION"

          if [ "$REMOTE_VERSION" = "$LOCAL_VERSION" ]; then
            echo "Version $LOCAL_VERSION already published, skipping."
            exit 0
          fi

          echo "== Publishing =="
          pnpm publish --provenance

  # Publish the Tari Wallet Daemon client to the NPM registry
  publish-wallet-daemon-client:
    runs-on: ubuntu-latest
    needs: publish-typescript-bindings
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: clients/javascript/wallet_daemon_client
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
      - name: Use Node.js from .nvmrc
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          registry-url: "https://registry.npmjs.org"
          node-version-file: .nvmrc
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: "Build Bindings Dist"
        working-directory: bindings
        run: pnpm run build-dist
      - run: pnpm run build
      - name: Publish to NPM
        run: |
          #set -euo pipefail

          echo "== Local package.json =="
          node -e "const p=require('./package.json'); console.log({name:p.name, version:p.version})"

          LOCAL_VERSION=$(node -p "require('./package.json').version")
          PACKAGE_NAME=$(node -p "require('./package.json').name")

          echo "Local version: $LOCAL_VERSION"
          echo "Package name:  $PACKAGE_NAME"

          echo "== Registry check =="
          echo "Running: pnpm info $PACKAGE_NAME version"

          REMOTE_VERSION=$(pnpm info "$PACKAGE_NAME" version 2>/dev/null || echo "NOT_FOUND")
          echo "Remote version: $REMOTE_VERSION"

          if [ "$REMOTE_VERSION" = "$LOCAL_VERSION" ]; then
            echo "Version $LOCAL_VERSION already published, skipping."
            exit 0
          fi

          echo "== Publishing =="
          pnpm publish --provenance

  # Publish the Tari Indexer client to the NPM registry
  publish-indexer-client:
    runs-on: ubuntu-latest
    needs: publish-typescript-bindings
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: clients/javascript/indexer_client
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
      - name: Use Node.js from .nvmrc
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          registry-url: "https://registry.npmjs.org"
          node-version-file: .nvmrc
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: "Build Bindings Dist"
        working-directory: bindings
        run: pnpm run build-dist
      - run: pnpm run build
      - name: Publish to NPM
        run: |
          #set -euo pipefail

          echo "== Local package.json =="
          node -e "const p=require('./package.json'); console.log({name:p.name, version:p.version})"

          LOCAL_VERSION=$(node -p "require('./package.json').version")
          PACKAGE_NAME=$(node -p "require('./package.json').name")

          echo "Local version: $LOCAL_VERSION"
          echo "Package name:  $PACKAGE_NAME"

          echo "== Registry check =="
          echo "Running: pnpm info $PACKAGE_NAME version"

          REMOTE_VERSION=$(pnpm info "$PACKAGE_NAME" version 2>/dev/null || echo "NOT_FOUND")
          echo "Remote version: $REMOTE_VERSION"

          if [ "$REMOTE_VERSION" = "$LOCAL_VERSION" ]; then
            echo "Version $LOCAL_VERSION already published, skipping."
            exit 0
          fi

          echo "== Publishing =="
          pnpm publish --provenance
