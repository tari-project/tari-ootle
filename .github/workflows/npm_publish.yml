---
# Publishing all NPM packages to the npm registry when the version number changes
# See https://github.com/marketplace/actions/npm-publish for more information
name: Publish Packages to npmjs

on:
  push:
    branches: development

env:
  # Set the Node.js version to use
  NODE_VERSION: '23.11.0'
  # Set the pnpm version to use
  PNPM_VERSION: '10'

permissions:
  id-token: write
  contents: read

jobs:
  # Publish the TypeScript bindings to the NPM registry
  publish-typescript-bindings:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bindings
    steps:
      - uses: actions/checkout@v6
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v6
        with:
          registry-url: "https://registry.npmjs.org"
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build-dist
      - name: Debug auth info
        run: |
          echo "Registry: $(npm config get registry)"
          env | grep ACTIONS_ID_TOKEN || echo "No OIDC env found"
          npm whoami || echo "Expected fail: OIDC not visible via npm whoami"
      - name: Publish to NPM
        run: |
          if pnpm info . version | grep -q "^$VERSION$"; then
            echo "Version $VERSION already published, skipping."
          else
            pnpm publish --access public --no-git-checks --provenance
          fi

  # Publish the Tari Wallet Daemon client to the NPM registry
  publish-wallet-daemon-client:
    runs-on: ubuntu-latest
    needs: publish-typescript-bindings
    defaults:
      run:
        working-directory: clients/javascript/wallet_daemon_client
    steps:
      - uses: actions/checkout@v6
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build-dist
        name: "Build Bindings Dist"
        working-directory: bindings
      - run: pnpm run build
      - run: pnpm publish --access public --no-git-checks || echo "Publish failed (probably already published)"

  # Publish the Tari Indexer client to the NPM registry
  publish-indexer-client:
    runs-on: ubuntu-latest
    needs: publish-typescript-bindings
    defaults:
      run:
        working-directory: clients/javascript/indexer_client
    steps:
      - uses: actions/checkout@v6
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build-dist
        name: "Build Bindings Dist"
        working-directory: bindings
      - run: pnpm run build
      - run: pnpm publish --access public --no-git-checks || echo "Publish failed (probably already published)"

