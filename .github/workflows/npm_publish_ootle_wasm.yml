---
name: Publish ootle-wasm to npmjs

on:
  push:
    branches: development
    paths:
      - 'crates/ootle_wasm/**'

env:
  WASM_PACK_VERSION: '0.13.1'

permissions:
  id-token: write
  contents: read

jobs:
  publish-ootle-wasm:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crates/ootle_wasm
    steps:
      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: ubuntu dependencies
        run: |
          sudo apt-get update
          sudo bash ../../scripts/install_ubuntu_dependencies.sh

      - name: Set up Rust target
        run: |
          rustup show
          rustup target add wasm32-unknown-unknown

      - name: Install wasm-pack
        run: cargo install wasm-pack --version "$WASM_PACK_VERSION" --locked

      - name: Use Node.js from .nvmrc
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          registry-url: "https://registry.npmjs.org"
          node-version-file: .nvmrc

      - name: Build WASM package
        run: bash build.sh bundler release

      - name: Publish to NPM
        working-directory: crates/ootle_wasm/pkg
        run: |
          echo "== Local package.json =="
          node -e "const p=require('./package.json'); console.log({name:p.name, version:p.version})"

          LOCAL_VERSION=$(node -p "require('./package.json').version")
          PACKAGE_NAME=$(node -p "require('./package.json').name")

          echo "Local version: $LOCAL_VERSION"
          echo "Package name:  $PACKAGE_NAME"

          echo "== Registry check =="
          echo "Running: npm view $PACKAGE_NAME version"

          REMOTE_VERSION=$(npm view "$PACKAGE_NAME" version 2>/dev/null || echo "NOT_FOUND")
          echo "Remote version: $REMOTE_VERSION"

          if [ "$REMOTE_VERSION" = "$LOCAL_VERSION" ]; then
            echo "Version $LOCAL_VERSION already published, skipping."
            exit 0
          fi

          echo "== Publishing =="
          npm publish --provenance
