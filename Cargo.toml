# NOTE: When editing this version, also edit the versions in template_built_in/templates/account and account_nft
[workspace.package]
version = "0.14.1"
edition = "2021"
authors = ["The Tari Development Community"]
repository = "https://github.com/tari-project/tari-ootle"
license = "BSD-3-Clause"


[workspace]
members = [
    "applications/tari_app_utilities",
    "applications/tari_wallet_cli",
    "applications/tari_walletd",
    "applications/tari_indexer",
    "applications/tari_scaffolder",
    "applications/tari_signaling_server",
    "applications/tari_swarm_daemon",
    "applications/tari_validator_node_cli",
    "applications/tari_validator_node",
    "applications/tari_watcher",
    "clients/base_node_client",
    "clients/tari_indexer_client",
    "clients/validator_node_client",
    "clients/wallet_daemon_client",
    "crates/epoch_oracles",
    "crates/consensus",
    "crates/consensus_tests",
    "crates/consensus_types",
    "crates/epoch_manager",
    "crates/indexer_lib",
    "crates/p2p",
    "crates/rpc_state_sync",
    "crates/state_store_rocksdb",
    "crates/state_tree",
    "crates/storage_sqlite",
    "crates/storage",
    "crates/state_store_tests",
    "crates/tari_bor",
    "crates/template_abi",
    "crates/template_builtin",
    "crates/template_lib",
    "crates/template_lib_types",
    "crates/template_macros",
    "crates/template_manager",
    "crates/template_test_tooling",
    "crates/transaction_manifest",
    "crates/transaction",
    "crates/validator_node_rpc",
    "crates/wallet/crypto",
    "crates/wallet/sdk",
    "crates/wallet/sdk_services",
    "crates/wallet/storage_sqlite",
    "crates/ootle_address",
    "integration_tests",
    "networking/core",
    "networking/swarm",
    "networking/rpc_framework",
    "networking/rpc_macros",
    "networking/libp2p-peersync",
    "networking/libp2p-substream",
    "networking/sqlite_message_logger",
    "utilities/tariswap_test_bench",
    "utilities/transaction_submitter",
    "utilities/transaction_submitter",
    "utilities/generate_ristretto_value_lookup",
    "utilities/db_inspector",
]
resolver = "2"

[workspace.dependencies]
# version numbers are required for deploying to crates.io. Hopefully we can work out a way of
# specifying them in a single place and having them applied to all crates

# apps
tari_ootle_walletd = { path = "applications/tari_walletd", default-features = false }
tari_validator_node = { path = "applications/tari_validator_node", default-features = false }
tari_validator_node_cli = { path = "applications/tari_validator_node_cli" }
tari_indexer = { path = "applications/tari_indexer", default-features = false }
tari_ootle_app_utilities = { path = "applications/tari_app_utilities" }

# core crates
tari_bor = { version = "0.11.1", path = "crates/tari_bor", default-features = false }
tari_consensus = { path = "crates/consensus" }
tari_consensus_types = { path = "crates/consensus_types" }
tari_ootle_common_types = { path = "crates/common_types" }
tari_ootle_address = { path = "crates/ootle_address" }
tari_engine = { path = "crates/engine" }
tari_engine_types = { path = "crates/engine_types" }
tari_ootle_p2p = { path = "crates/p2p" }
tari_ootle_storage = { path = "crates/storage" }
tari_ootle_storage_sqlite = { path = "crates/storage_sqlite" }
tari_ootle_wallet_crypto = { path = "crates/wallet/crypto" }
tari_ootle_wallet_sdk = { path = "crates/wallet/sdk" }
tari_ootle_wallet_sdk_services = { path = "crates/wallet/sdk_services" }
tari_ootle_wallet_storage_sqlite = { path = "crates/wallet/storage_sqlite" }
tari_epoch_manager = { path = "crates/epoch_manager" }
tari_epoch_oracles = { path = "crates/epoch_oracles" }
tari_indexer_lib = { path = "crates/indexer_lib" }
tari_rpc_state_sync = { path = "crates/rpc_state_sync" }
tari_state_store_rocksdb = { path = "crates/state_store_rocksdb" }
tari_state_tree = { path = "crates/state_tree" }
tari_template_abi = { version = "0.14.0", path = "crates/template_abi", default-features = false }
tari_template_builtin = { path = "crates/template_builtin" }
tari_template_lib = { path = "crates/template_lib" }
tari_template_lib_types = { version = "0.14.0", path = "crates/template_lib_types", default-features = false }
tari_template_macros = { version = "0.14.0", path = "crates/template_macros" }
tari_template_manager = { path = "crates/template_manager" }
tari_template_test_tooling = { path = "crates/template_test_tooling" }
tari_transaction = { path = "crates/transaction" }
tari_transaction_manifest = { path = "crates/transaction_manifest" }
tari_validator_node_rpc = { path = "crates/validator_node_rpc" }
sqlite_message_logger = { path = "networking/sqlite_message_logger" }
tari_base_node_client = { path = "clients/base_node_client" }
tari_indexer_client = { path = "clients/tari_indexer_client", default-features = false }
tari_networking = { path = "networking/core" }
tari_rpc_framework = { path = "networking/rpc_framework" }
tari_rpc_macros = { path = "networking/rpc_macros" }
tari_swarm = { path = "networking/swarm" }
tari_validator_node_client = { path = "clients/validator_node_client" }
tari_wallet_daemon_client = { path = "clients/wallet_daemon_client" }
transaction_generator = { path = "utilities/transaction_generator" }

# external minotari/tari dependencies
minotari_app_grpc = { git = "https://github.com/tari-project/tari.git", tag = "v5.1.0-rc.1" }
minotari_app_utilities = { git = "https://github.com/tari-project/tari.git", tag = "v5.1.0-rc.1" }
minotari_console_wallet = { git = "https://github.com/tari-project/tari.git", tag = "v5.1.0-rc.1" }
minotari_node = { git = "https://github.com/tari-project/tari.git", tag = "v5.1.0-rc.1" }
minotari_node_grpc_client = { git = "https://github.com/tari-project/tari.git", tag = "v5.1.0-rc.1" }
minotari_wallet = { git = "https://github.com/tari-project/tari.git", tag = "v5.1.0-rc.1" }
minotari_wallet_grpc_client = { git = "https://github.com/tari-project/tari.git", tag = "v5.1.0-rc.1" }
