libp2p = { git = "https://github.com/tari-project/rust-libp2p.git", rev = "debc01257dd979418d7793f2dc91d25471de5c38", version = "0.56.0", default-features = false }
#libp2p = "0.53.1"
#libp2p-identity = "0.2.8"
