multiaddr = { git = "https://github.com/tari-project/rust-libp2p.git", rev = "debc01257dd979418d7793f2dc91d25471de5c38" }
#multiaddr = "0.18"
newtype-ops = "0.1.4"
once_cell = "1.18.0"
pin-project = "1.1"
