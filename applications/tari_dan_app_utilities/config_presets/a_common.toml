########################################################################################################################
#                                                                                                                      #
#                      Common Configuration Options (CommonConfig, AutoUpdateConfig, MetricsConfig)                    #
#                                                                                                                      #
########################################################################################################################

[common]
#override_from="stagenet"
#base_path="<HOME>/.tari"

[stagenet.auto_update]
# Customize the hosts that are used to check for updates. These hosts must contain update information in DNS TXT records.
update_uris = ["updates.stagenet.taripulse.com"]

[auto_update]
# Name server for auto update (default = "1.1.1.1:53/cloudflare.net")
#name_server = "1.1.1.1:53/cloudflare.net"

# Customize the hosts that are used to check for updates. These hosts must contain update information in DNS TXT
# records. (default = [])
#update_uris = []

#use_dnssec = false

#download_base_url = ""

# Customize the location of the update SHA hashes and maintainer-signed signature.
#hashes_url = "https://<address>/hashes.txt"
#hashes_sig_url = "https://<address>/hashes.txt.sig"

# This interval in seconds to check for software updates. Setting this to 0 disables checking.
check_interval = 300

[metrics]
# server_bind_address = "127.0.0.1:5577"
# push_endpoint = http://localhost:9091/metrics/job/base-node
[epoch_oracle]
oracle = "BaseLayer"
# Or
#oracle = "Configured"
[epoch_oracle.base_layer]
# The Minotari base node's GRPC url. (default = "http://127.0.0.1:<port>" the <port> value is based on network)
#base_node_grpc_url = "http://127.0.0.1:18142"

# How often do we want to scan the base layer for changes in seconds. (default = 10)
#scanning_interval = 10

[epoch_oracle.configured]
# Absolute or relative (to current working dir) path to the oracle config file.
# Example toml:
#  epoch_time = 720 # 12 minutes
#  initial_epoch = 1
#  [[[epoch_oracle.configured.validators]]
#  public_key = "7056240dedac879422d9d319704eddd699b1b5b4ab82a2b49324a1dae591dd78"
#  claim_key = "7056240dedac879422d9d319704eddd699b1b5b4ab82a2b49324a1dae591dd78"
#  registration_epoch = 5
#  shard_group = { start = 1, end_inclusive = 256 }
#config_file = "/path/to/oracle/config.toml"
