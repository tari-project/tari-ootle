language: "typescript"
platform: "node"
type: "library"

fileGroups:
  configs:
    - "tsconfig.json"
    - "vite.config.ts"
    - "package.json"
    - "eslint.config.ts"
  sources:
    - "src/**/*"
    - "public/**/*"

tasks:
  build:
    command: "pnpm run build"
    inputs:
      - "@files(sources)"
      - "@files(configs)"
    outputs:
      - "dist"
