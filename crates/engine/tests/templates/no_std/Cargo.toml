[workspace]
[package]
name = "state"
version = "0.1.0"
edition = "2024"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
tari_template_lib = { path = "../../../../template_lib", default-features = false, features = ["macro", "alloc"] }

# WARN: dont use weealloc in production. https://github.com/rustwasm/wee_alloc/issues/106
# Unfortunately, talc does not seem to work in non-trivial cases # TODO: investigate this further
wee_alloc = "0.4.5"


[lib]
crate-type = ["cdylib", "lib"]
