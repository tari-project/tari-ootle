language = "C"
header = """/*
 * Copyright 2026 The Tari Project
 * SPDX-License-Identifier: BSD-3-Clause
 *
 * ootle_sdk.h — flat C ABI for the Tari Ootle fat core (ootle-sdk-core).
 *
 * GENERATED by cbindgen from crates/ootle_sdk_ffi_c. Do not edit by hand; run
 * `cargo build -p ootle_sdk_ffi_c` to regenerate.
 */"""
include_guard = "OOTLE_SDK_H"
pragma_once = true
tab_width = 4
style = "type"
cpp_compat = true
documentation = true
documentation_style = "doxy"

# The two opaque handle structs carry a Rust-side `kind: HandleKind` tag (the type-confusion guard)
# and so are `#[repr(C)]` with named fields whose types are non-FFI core types. They are annotated
# `cbindgen:no-export` so cbindgen never emits their bodies (which would leak
# the internal payload types and change the wire surface). We re-declare them here as opaque forward
# declarations — exactly the form the header carried before the guard — so the C/cgo host still sees an
# opaque pointer type and the wire surface is unchanged.
after_includes = """
typedef struct OotlePartialTransaction OotlePartialTransaction;
typedef struct OotleStealthPartialTransaction OotleStealthPartialTransaction;"""

[parse]
parse_deps = false

[enum]
prefix_with_name = true

[fn]
sort_by = "None"
