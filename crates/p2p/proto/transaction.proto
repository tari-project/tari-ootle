syntax = "proto3";

package tari.ootle.transaction;

import "common.proto";

message NewTransactionMessage {
  Transaction transaction = 1;
}

message CommitmentSignature {
  bytes public_nonce_commitment = 1;
  bytes signature_u = 2;
  bytes signature_v = 3;
}

message Transaction {
  bytes bor_encoded = 1;
}

enum AllocatableAddressType {
  NONE = 0;
  COMPONENT = 1;
  RESOURCE = 2;
}

message Instruction {
  enum InstructionType {
    FUNCTION = 0;
    METHOD = 1;
    PUT_OUTPUT_IN_WORKSPACE = 2;
    EMIT_LOG = 3;
    CLAIM_BURN = 4;
    CLAIM_VALIDATOR_FEES = 5;
    DROP_ALL_PROOFS_IN_WORKSPACE = 6;
    CREATE_ACCOUNT = 7;
    ASSERT_BUCKET_CONTAINS = 8;
    PUBLISH_TEMPLATE = 9;
    ALLOCATE_ADDRESS = 10;
    STEALTH_TRANSFER = 11;
  }
  InstructionType instruction_type = 1;

  // common fields
  bytes template_address = 2;
  repeated Arg args = 3;

  // function only
  string function = 4;

  // method only
  ComponentCall component_call = 5;
  string method = 6;

  // PutLastInstructionOutputOnWorkspace
  uint32 workspace_put_key = 7;

  // EmitLog
  string log_level = 8;
  string log_message = 9;

  // ClaimBurn
  bytes claim_burn_commitment_address = 10;
  bytes claim_burn_range_proof = 11;
  CommitmentSignature claim_burn_proof_of_knowledge = 12;
  bytes claim_burn_public_key = 13;
  ConfidentialWithdrawProof claim_burn_withdraw_proof = 14;

  // ClaimValidatorFees
  bytes claim_validator_fees_address = 15;

  // CreateAccount
  bytes create_account_public_key = 16;
  OwnerRule create_account_owner_rule = 17;
  AccessRules create_account_access_rules = 18;
  WorkspaceOffsetId create_account_workspace_id = 19;

  // AssertBucketContains
  WorkspaceOffsetId assert_bucket_workspace_id = 20;
  bytes resource_address = 21;
  tari.ootle.common.Amount min_amount = 22;

  // PublishTemplate
  bytes template_binary = 23;

  // AllocateAddress
  AllocatableAddressType allocatable_address_type = 24;
  uint32 allocate_address_workspace_id = 25;

  // StealthTransfer
  bytes stealth_transfer_resource_address = 26;
  StealthTransferStatement stealth_transfer_statement = 27;
  WorkspaceOffsetId stealth_transfer_revealed_input_bucket = 28;
}

message ComponentCall {
  oneof call {
    bytes address = 1;
    uint32 allocation = 2;
  }
}

message Arg {
  oneof arg_value {
    bytes literal = 1;
    WorkspaceOffsetId workspace = 2;
  }
}

message OptionWorkspaceId {
  uint32 workspace_id = 1;
}

message WorkspaceOffsetId {
  uint32 id = 1;
  OptionOffset offset = 2;
}

message OptionOffset {
  uint64 offset = 1;
}

message SubstateRequirement {
  bytes substate_id = 1;
  OptionalVersion version = 2;
}

message OptionalVersion {
  uint32 version = 1;
}

message VersionedSubstateId {
  bytes substate_id = 1;
  uint32 version = 2;
}

message ConfidentialWithdrawProof {
  repeated bytes inputs = 1;
  tari.ootle.common.Amount input_revealed_amount = 2;
  ConfidentialOutputStatement output_proof = 3;
  bytes balance_proof = 4;
}

message ConfidentialOutputStatement {
  UnspentOutput output_statement = 1;
  UnspentOutput change_statement = 2;
  bytes range_proof = 3;
  tari.ootle.common.Amount output_revealed_amount = 4;
  tari.ootle.common.Amount change_revealed_amount = 5;
}

message UnspentOutput {
  bytes commitment = 1;
  bytes sender_public_nonce = 2;
  bytes encrypted_value = 3;
  uint64 minimum_value_promise = 4;
  ViewableBalanceProof viewable_balance_proof = 5;
}

message ViewableBalanceProof {
  bytes elgamal_encrypted = 1;
  bytes elgamal_public_nonce = 2;
  bytes c_prime = 3;
  bytes e_prime = 4;
  bytes r_prime = 5;
  bytes s_v = 6;
  bytes s_m = 7;
  bytes s_r = 8;
}

message OwnerRule {
  bytes encoded_owner_rule = 1;
}

message AccessRules {
  bytes encoded_access_rules = 1;
}

message StealthTransferStatement {
  repeated bytes inputs = 1;
  StealthOutputsStatement outputs_statement = 2;
  bytes balance_proof = 3;
}

message StealthOutputsStatement {
  /// Proof of the confidential resources that are going to be transferred to the receiver
  repeated UnspentOutput outputs = 1;
  /// The amount of revealed funds to output. If this is a positive (non-zero) value, a bucket containing the
  /// revealed stealth funds is created.
  tari.ootle.common.Amount revealed_output_amount = 2;
  /// Bulletproof range proof for the output commitments proving that values are in the range
  /// [minimum_value_promise, 2^64)
  bytes agg_range_proof = 3;
}