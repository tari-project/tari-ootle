syntax = "proto3";

package tari.ootle.transaction;

import "common.proto";

message NewTransactionMessage {
  Transaction transaction = 1;
}

message Transaction {
  bytes bor_encoded = 1;
}

enum AllocatableAddressType {
  NONE = 0;
  COMPONENT = 1;
  RESOURCE = 2;
}

message Instruction {
  oneof instruction {
    CallFunction call_function = 1;
    CallMethod call_method = 2;
    uint32 put_last_instruction_output_on_workspace = 3;
    EmitLog emit_log = 4;
    ClaimBurn claim_burn = 5;
    ClaimValidatorFees claim_validator_fees = 6;
    bool drop_all_proofs_in_workspace = 7;
    CreateAccount create_account = 8;
    AssertBucketContains assert_bucket_contains = 9;
    PublishTemplate publish_template = 10;
    AllocateAddress allocate_address = 11;
    StealthTransfer stealth_transfer = 12;
    PayFee pay_fee = 13;
  }
}

message CallFunction {
  bytes template_address = 1;
  string function = 2;
  repeated Arg args = 3;
}

message CallMethod {
  ComponentCall component_call = 1;
  string method = 2;
  repeated Arg args = 3;
}

message ClaimBurn {
  bytes commitment = 1;
  uint64 value = 2;
  tari.ootle.common.Signature proof_of_knowledge = 3;
  bytes public_key = 4;
  EncodedMerkleProof encoded_merkle_proof = 5;
  bytes encrypted_data = 6;
  AbridgedKernel kernel = 7;
}

message AbridgedKernel {
  uint32 version = 1;
  uint64 fee = 2;
  uint64 lock_height = 3;
  bytes excess = 4;
  tari.ootle.common.Signature excess_sig = 5;
}

message EmitLog {
  string log_level = 1;
  string log_message = 2;
}

message ClaimValidatorFees {
  bytes fee_pool_address = 1;
}

message CreateAccount {
  bytes public_key = 1;
  OwnerRule owner_rule = 2;
  AccessRules access_rules = 3;
  WorkspaceOffsetId workspace_id = 4;
}

message AssertBucketContains {
  WorkspaceOffsetId bucket = 1;
  bytes resource_address = 2;
  tari.ootle.common.Amount min_amount = 3;
}

message PublishTemplate {
  bytes binary = 1;
}

message AllocateAddress {
  AllocatableAddressType address_type = 1;
  uint32 workspace_id = 2;
}

message StealthTransfer {
  ResourceAddressRef resource_address = 1;
  StealthTransferStatement statement = 2;
  WorkspaceOffsetId revealed_input_bucket = 3;
}

message PayFee {
  StealthTransferStatement statement = 1;
  WorkspaceOffsetId revealed_input_bucket = 2;
}

message ComponentCall {
  oneof call {
    bytes address = 1;
    uint32 allocation = 2;
  }
}

message ResourceAddressRef {
  oneof inner {
    bytes address = 1;
    WorkspaceOffsetId workspace = 2;
  }
}

message Arg {
  oneof arg_value {
    bytes literal = 1;
    WorkspaceOffsetId workspace = 2;
  }
}

message OptionWorkspaceId {
  uint32 workspace_id = 1;
}

message WorkspaceOffsetId {
  uint32 id = 1;
  OptionOffset offset = 2;
}

message OptionOffset {
  uint64 offset = 1;
}

message SubstateRequirement {
  bytes substate_id = 1;
  OptionalVersion version = 2;
}

message OptionalVersion {
  uint32 version = 1;
}

message VersionedSubstateId {
  bytes substate_id = 1;
  uint32 version = 2;
}

message ConfidentialWithdrawProof {
  repeated bytes inputs = 1;
  tari.ootle.common.Amount input_revealed_amount = 2;
  ConfidentialOutputStatement output_proof = 3;
  bytes balance_proof = 4;
}

message ConfidentialOutputStatement {
  UnspentOutput output_statement = 1;
  UnspentOutput change_statement = 2;
  bytes range_proof = 3;
  tari.ootle.common.Amount output_revealed_amount = 4;
  tari.ootle.common.Amount change_revealed_amount = 5;
}

message UnspentOutput {
  bytes commitment = 1;
  bytes sender_public_nonce = 2;
  bytes encrypted_data = 3;
  uint64 minimum_value_promise = 4;
  ViewableBalanceProof viewable_balance_proof = 5;
}

message ViewableBalanceProof {
  bytes elgamal_encrypted = 1;
  bytes elgamal_public_nonce = 2;
  bytes c_prime = 3;
  bytes e_prime = 4;
  bytes r_prime = 5;
  bytes s_v = 6;
  bytes s_m = 7;
  bytes s_r = 8;
}

message OwnerRule {
  bytes encoded_owner_rule = 1;
}

message AccessRules {
  bytes encoded_access_rules = 1;
}

message StealthTransferStatement {
  StealthInputsStatement inputs_statement = 1;
  StealthOutputsStatement outputs_statement = 2;
  bytes balance_proof = 3;
}

message StealthOutputsStatement {
  /// Proof of the confidential resources that are going to be transferred to the receiver
  repeated StealthUnspentOutput outputs = 1;
  /// The amount of revealed funds to output. If this is a positive (non-zero) value, a bucket containing the
  /// revealed stealth funds is created.
  tari.ootle.common.Amount revealed_output_amount = 2;
  /// Bulletproof range proof for the output commitments proving that values are in the range
  /// [minimum_value_promise, 2^64)
  bytes agg_range_proof = 3;
}

message StealthUnspentOutput {
  UnspentOutput output = 1;
  bytes owner_public_key = 2;
  uint32 tag_byte = 3;
}

message StealthInput {
  bytes commitment = 1;
  tari.ootle.common.Signature owner_proof = 2;
}

message StealthInputsStatement {
  repeated StealthInput inputs = 1;
  tari.ootle.common.Amount revealed_amount = 2;
  bytes required_signer = 3;
}


message EncodedMerkleProof {
  bytes block_hash = 1;
  bytes encoded_proof = 2;
  uint64 leaf_index = 3;
}