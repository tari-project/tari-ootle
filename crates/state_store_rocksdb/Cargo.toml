[package]
name = "tari_state_store_rocksdb"
description = "RocksDB implementation of Tari state store"
version.workspace = true
edition.workspace = true
authors.workspace = true
repository.workspace = true
license.workspace = true

[dependencies]
tari_common_types = { workspace = true } # needed for FixedHash
tari_ootle_storage = { workspace = true }
tari_ootle_common_types = { workspace = true }
tari_ootle_transaction = { workspace = true }
tari_engine_types = { workspace = true }
tari_state_tree = { workspace = true }
tari_template_lib_types = { workspace = true, features = ["bincode-compat"] }
tari_consensus_types = { workspace = true }

anyhow = { workspace = true }
borsh = { workspace = true, features = ["derive"] }
bincode = { workspace = true, features = ["serde"] }
indexmap = { workspace = true }
hex = { workspace = true }
log = { workspace = true }
rocksdb = { workspace = true }
serde = { workspace = true, default-features = true }
strum_macros = { workspace = true }
smallvec = { workspace = true, features = ["serde"] }
thiserror = { workspace = true }

[dev-dependencies]
tempfile = { workspace = true }
rand = { workspace = true }
tari_utilities = { workspace = true }
tari_template_lib = { workspace = true, features = ["bincode-compat"] }
tari_bor = { workspace = true }
tari_sidechain = { workspace = true }
# Dev-dep cycle: rollback-only storage primitives moved out of this crate's lib into
# `tari_validator_rollback::storage`, but the tests that exercise them stay here for
# the helpers. Cargo permits this because dev-deps don't create a real build cycle.
tari_validator_rollback = { path = "../../utilities/validator_rollback" }
