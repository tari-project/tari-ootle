[package]
name = "tari_template_builtin"
description = "Tari Ootle built-in templates"
version = "0.35.0"
edition.workspace = true
authors.workspace = true
repository.workspace = true
license.workspace = true
# Include pre-compiled .wasm files that are gitignored
include = ["/src", "/compiled/*.wasm", "Cargo.toml", "README.md", "LICENSE*"]

[dependencies]
tari_template_lib_types = { workspace = true }
minicbor = { workspace = true, default-features = false, features = ["alloc", "derive"], optional = true }

[dev-dependencies]
# Path-only (no version) to break the circular dev-dep: tari_template_test_tooling
# depends on tari_template_builtin, so we can't list it with a published version here
# or `cargo publish` can't resolve the manifest.
tari_template_test_tooling = { path = "../template_test_tooling" }
tari_engine_types = { workspace = true }
tari_template_lib = { workspace = true }
tari_ootle_transaction = { workspace = true }

[build-dependencies]
anyhow = { workspace = true }

[features]
default = []
templates = []
# Host-side mirrors of the WASM builtin templates' component state structs.
# Pulled in by genesis bootstrap and test fixtures; not needed for consumers
# that only want template addresses / WASM binaries.
state = ["dep:minicbor"]