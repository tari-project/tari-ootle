[workspace]
[package]
name = "account"
version = "0.9.1"
edition = "2024"

[dependencies]
tari_template_abi = { path = "../../../template_abi" }
tari_template_lib = { path = "../../../template_lib" }

[lib]
crate-type = ["cdylib"]

[profile.release]
# Optimize for performance at the cost of compilation time.
# Note: since this is a builtin template, binary size is not a concern.
# For other templates, consider setting opt-level to "s" or "z" to reduce binary size.
opt-level = 3
lto = true          # Enable Link Time Optimization.
codegen-units = 1   # Reduce number of codegen units to increase optimizations.
panic = 'abort'     # Abort on panic (reduces binary size).
strip = 'debuginfo' # Strip debug info to reduce binary size.

