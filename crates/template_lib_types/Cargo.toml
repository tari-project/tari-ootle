[package]
name = "tari_template_lib_types"
version = "0.27.1"
edition.workspace = true
authors.workspace = true
description = "Tari template library types"
repository.workspace = true
license.workspace = true

[features]
default = ["std"]
std = ["minicbor/std", "serde?/std", "tari_template_abi/std", "borsh?/std", "num-integer?/std"]
alloc = ["minicbor/alloc", "serde?/alloc", "tari_template_abi/alloc"]
precision = ["dep:bnum"]
extra-arith = ["dep:num-integer", "bnum?/numtraits"]
borsh = ["dep:borsh", "tari_bor/borsh", "bnum?/borsh"]
extra-maps = ["dep:indexmap", "dep:xxhash-rust", "tari_bor/indexmap"]
serde = ["dep:serde", "tari_bor/serde", "tari_template_abi/serde"]
ts = ["std", "ts-rs", "tari_template_abi/ts", "tari_bor/ts"]

[dependencies]
tari_template_abi = { workspace = true, default-features = false }
tari_bor = { workspace = true }
minicbor = { workspace = true, default-features = false, features = ["alloc", "derive"] }

bnum = { workspace = true, optional = true }
num-integer = { workspace = true, optional = true, default-features = false }
borsh = { workspace = true, optional = true, default-features = false, features = ["derive"] }
indexmap = { workspace = true, optional = true, features = ["serde"] }
serde = { workspace = true, default-features = false, optional = true, features = ["derive"] }
ts-rs = { workspace = true, optional = true }
xxhash-rust = { workspace = true, optional = true, features = ["xxh3"] }

[dev-dependencies]
serde_json = { workspace = true }
tari_crypto = { workspace = true, features = ["borsh"] }
borsh = { workspace = true }
