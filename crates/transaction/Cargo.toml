[package]
name = "tari_transaction"
description = "Tari transaction builder and associated data types"
version.workspace = true
edition.workspace = true
authors.workspace = true
repository.workspace = true
license.workspace = true

[dependencies]
tari_engine_types = { workspace = true }
tari_ootle_common_types = { workspace = true }
tari_crypto = { workspace = true, features = ["borsh"] }
tari_template_lib = { workspace = true }
tari_bor = { workspace = true }

borsh = { workspace = true }
log = { workspace = true }
rand = { workspace = true }
indexmap = { workspace = true, features = ["serde"] }
serde = { workspace = true, default-features = true }
serde_json = { workspace = true }
ts-rs = { workspace = true, optional = true }
hex = { workspace = true }
thiserror = { workspace = true }

[features]
ts = ["ts-rs", "tari_engine_types/ts", "tari_ootle_common_types/ts", "tari_template_lib/ts", "tari_bor/ts"]
