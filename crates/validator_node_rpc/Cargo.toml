[package]
name = "tari_validator_node_rpc"
description = "Peer-to-peer RPC implementation for the Validator Node"
version.workspace = true
edition.workspace = true
authors.workspace = true
repository.workspace = true
license.workspace = true

[dependencies]
tari_networking = { workspace = true }
tari_rpc_framework = { workspace = true }
tari_rpc_macros = { workspace = true }
tari_ootle_common_types = { workspace = true }
tari_ootle_p2p = { workspace = true }
tari_ootle_storage = { workspace = true }
tari_engine_types = { workspace = true }
tari_ootle_transaction = { workspace = true }
tari_bor = { workspace = true, default-features = true }
tari_consensus_types = { workspace = true }

anyhow = { workspace = true }
prost = { workspace = true }
serde = { workspace = true, default-features = true }
futures = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true, default-features = false, features = ["sync"] }

[build-dependencies]
proto_builder = { workspace = true }

[package.metadata.cargo-machete]
ignored = [
    # Used via OUT_DIR macro, not detectable
    "prost",
]
