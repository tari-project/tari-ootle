[package]
name = "tari_ootle_wallet_crypto"
version.workspace = true
edition.workspace = true
authors.workspace = true
repository.workspace = true
license.workspace = true

[dependencies]
tari_engine_types = { workspace = true }
tari_ootle_common_types = { workspace = true }
tari_template_lib = { workspace = true, features = ["std"] }
tari_crypto = { workspace = true }
tari_hashing = { workspace = true }
tari_utilities = { workspace = true }

blake2 = { workspace = true }
bs58 = { workspace = true }
chacha20poly1305 = { workspace = true }
digest = { workspace = true }
rand = { workspace = true }
serde = { workspace = true, features = ["derive"], optional = true }
thiserror = { workspace = true }
ts-rs = { workspace = true, optional = true }
zeroize = { workspace = true }

[dev-dependencies]
tari_template_test_tooling = { workspace = true }
serde_json = { workspace = true }
bincode = { workspace = true, features = ["serde"] }

[features]
default = []
serde = ["dep:serde"]
ts = ["ts-rs"]