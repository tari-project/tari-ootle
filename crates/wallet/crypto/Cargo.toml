[package]
name = "tari_ootle_wallet_crypto"
version.workspace = true
description = "Cryptographic utilities and types for Tari Ootle wallet"
edition.workspace = true
authors.workspace = true
repository.workspace = true
license.workspace = true

[dependencies]
tari_engine_types = { workspace = true }
tari_ootle_common_types = { workspace = true }
tari_template_lib_types = { workspace = true, features = ["std"] }
tari_crypto = { workspace = true }
tari_hashing = { workspace = true }
tari_utilities = { workspace = true }
ootle_byte_type = { workspace = true, features = ["crypto"] }
ootle-network = { workspace = true }

argon2 = "0.5.3"
blake2 = { workspace = true }
borsh = { workspace = true }
chacha20poly1305 = { workspace = true }
crc32fast = "1.5.0"
digest = { workspace = true }
rand = { workspace = true }
serde = { workspace = true, optional = true, features = ["derive"] }
subtle = "2.6.1"
thiserror = { workspace = true }
ts-rs = { workspace = true, optional = true }
zeroize = { workspace = true, features = ["simd"] }
memmap2 = { workspace = true, optional = true }
log = { workspace = true }

[dev-dependencies]
serde_json = { workspace = true }
tari_bor = { workspace = true }

[features]
default = []
serde = ["dep:serde"]
ts = ["dep:ts-rs"]
mmap-value-lookup = ["dep:memmap2"]
