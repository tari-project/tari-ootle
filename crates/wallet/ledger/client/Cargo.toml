[package]
name = "tari_ledger_client"
version = "0.1.1"
description = "A client for interacting with Ootle Ledger wallet app."
edition.workspace = true
authors.workspace = true
repository.workspace = true
license.workspace = true

[dependencies]
ootle_ledger_common = { workspace = true }
tari_template_lib_types = { workspace = true }

ledger-transport = "0.11.0"
ledger-transport-hid = { version = "0.11.0", optional = true }
thiserror = { workspace = true }

# Speculos transport
reqwest = { workspace = true, features = ["json"], optional = true }
serde = { workspace = true, optional = true }
hex = { workspace = true, optional = true }
borsh = { workspace = true, default-features = false }

[dev-dependencies]
tokio = { version = "1", features = ["rt-multi-thread", "macros"] }
# Host reference test that proves the device signing recipe verifies under tari_crypto.
tari_ootle_transaction = { workspace = true }
curve25519-dalek = { version = "4", features = ["rand_core"] }
blake2 = { workspace = true }
rand = { workspace = true }
indexmap = { workspace = true }

[features]
speculos-transport = ["serde", "reqwest", "hex"]
hid-transport = ["dep:ledger-transport-hid"]