[package]
name = "ootle-rs"
version.workspace = true
edition.workspace = true
authors.workspace = true
repository.workspace = true
license.workspace = true

[dependencies]
tari_ootle_common_types = { workspace = true }
tari_ootle_transaction = { workspace = true }
tari_template_lib_types = { workspace = true, features = ["extra-arith", "borsh"] }
tari_ootle_wallet_sdk = { workspace = true }
tari_crypto = { workspace = true }
tari_bor = { workspace = true }
ootle_serde = { workspace = true, features = ["base64"] }
ootle_byte_type = { workspace = true, features = ["crypto"] }
tari_indexer_client = { workspace = true, features = ["client"] }
tari_ootle_address = { workspace = true }

async-trait = { workspace = true }
rand = { workspace = true }
tokio = { workspace = true, features = ["sync"] }
futures = { workspace = true }
thiserror = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
tracing = { workspace = true }
async-stream = { workspace = true }

[dev-dependencies]
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }
hex = { workspace = true }
tari_common_types = { workspace = true }
env_logger = { workspace = true }
tracing = { workspace = true, features = ["log-always"] }

[features]
default = []