[package]
name = "tari_template_lib_types"
version.workspace = true
edition.workspace = true
authors.workspace = true
repository.workspace = true
license.workspace = true

[features]
default = ["std"]
std = ["serde/std", "tari_template_abi/std", "borsh?/std"]
borsh = ["dep:borsh"]
ts = ["ts-rs"]

[dependencies]
tari_template_abi = { workspace = true, default-features = false }

borsh = { workspace = true, optional = true, default-features = false, features = ["derive"] }
serde = { workspace = true, default-features = false, features = ["derive"] }
ts-rs = { workspace = true, optional = true }

[dev-dependencies]
tari_bor = { workspace = true }
serde_json = { workspace = true }