language: "typescript"
platform: "node"
#type: "library"

fileGroups:
  configs:
    - "tsconfig.json"
    - "package.json"
    - "eslint.config.ts"
  sources:
    - "src/**/*"

tasks:
  install:
    command: "pnpm install --filter db-inspector"
    inputs:
      - "@files(configs)"
    outputs:
      - "node_modules"
  build:
    command: "pnpm run build"
    deps:
      - "db-inspector:install"
    inputs:
      - "@files(sources)"
      - "@files(configs)"
    outputs:
      - "dist"
  dev:
    command: "pnpm run dev"
    deps:
      - "db-inspector:install"
    inputs:
      - "@files(sources)"
      - "@files(configs)"
