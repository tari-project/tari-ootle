[package]
name = "tariswap_bench"
version.workspace = true
edition.workspace = true
authors.workspace = true
repository.workspace = true
license.workspace = true

[dependencies]
tari_crypto = { workspace = true }
tari_ootle_wallet_sdk = { workspace = true }
tari_ootle_wallet_sdk_services = { workspace = true, features = ["indexer_client"] }
tari_ootle_common_types = { workspace = true }
tari_ootle_wallet_storage_sqlite = { workspace = true }
tari_engine_types = { workspace = true }
tari_template_lib = { workspace = true }
tari_ootle_transaction = { workspace = true }
tari_indexer_client = { workspace = true }
ootle_byte_type = { workspace = true, features = ["crypto"] }

clap = { version = "4.3.21", features = ["derive"] }
url = { workspace = true, features = [] }
time = { workspace = true }
anyhow = { workspace = true }
tokio = { workspace = true, features = ["macros"] }
log = { workspace = true }
fern = { workspace = true, features = ["colored"] }
