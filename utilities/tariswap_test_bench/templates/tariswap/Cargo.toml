[workspace]
[package]
name = "tariswap"
version = "0.1.0"
edition = "2024"
description = "Swap template used for stress testing"

[package.metadata.tari-template]
tags = ["defi"]
category = "defi"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
tari_template_abi = { path = "../../../../crates/template_abi" }
tari_template_lib = { path = "../../../../crates/template_lib" }

[lib]
crate-type = ["cdylib"]

[profile.release]
opt-level = 's'     # Optimize for size.
lto = true          # Enable Link Time Optimization.
codegen-units = 1   # Reduce number of codegen units to increase optimizations.
panic = 'abort'     # Abort on panic.
strip = true# Strip debug info.

[build-dependencies]
tari_ootle_template_build = "0.7"
