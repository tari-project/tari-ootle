[package]
name = "traffic-sim"
version.workspace = true
edition.workspace = true
authors.workspace = true
repository.workspace = true
license.workspace = true

[dependencies]
clap = { version = "4.0", features = ["derive"] }
tokio = { version = "1.0", features = ["rt-multi-thread", "macros"] }
anyhow = { workspace = true }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
reqwest = { workspace = true, features = ["json"] }
rand = { workspace = true }
log = { workspace = true }
env_logger = { workspace = true }
csv = "1.4.0"

tari_wallet_daemon_client = { workspace = true }
tari_template_lib = { workspace = true }
tari_ootle_common_types = { workspace = true }
tari_ootle_wallet_sdk = { workspace = true }
tari_ootle_transaction = { workspace = true }
tari_indexer_client = { workspace = true, features = ["client"] }
