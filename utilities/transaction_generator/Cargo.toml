[package]
name = "transaction_generator"
version.workspace = true
edition.workspace = true
authors.workspace = true
repository.workspace = true
license.workspace = true

[dependencies]
tari_template_lib_types = { workspace = true }
tari_ootle_transaction = { workspace = true }
tari_transaction_manifest = { workspace = true }
tari_ootle_common_types = { workspace = true }
tari_crypto = { workspace = true }
ootle_byte_type = { workspace = true, features = ["crypto"] }

anyhow = { workspace = true }
bytes = { workspace = true }
tari_bor = { workspace = true }
# if we set clap version 4 in the workspace it would break other crates
clap = { version = "4.3.21", features = ["derive"] }
rayon = { workspace = true }
rand = { workspace = true }
once_cell = { workspace = true, features = ["critical-section"] }

[dev-dependencies]
# Used by tests/max_compute.rs to measure the max_compute template's metered cost via the engine.
tari_template_test_tooling = { workspace = true }
tari_engine_types = { workspace = true }

[package.metadata.cargo-machete]
ignored = [
    # Need to force critical_section feature
    "once_cell",
]
